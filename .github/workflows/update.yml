# ══════════════════════════════════════════════════════════════
# Segunda Vuelta Presidencial 2026 — Actualización automática
#
# Cada 10 minutos, GitHub llama directamente a la API de ONPE,
# genera data.json y hace commit automático.
# GitHub Pages sirve el JSON al dashboard.
# ══════════════════════════════════════════════════════════════

name: "🗳️ Actualizar datos ONPE 2v"

on:
  schedule:
    # Cada 10 minutos (mínimo permitido por GitHub Actions)
    - cron: "*/10 * * * *"
  # Permite correrlo manualmente desde la pestaña "Actions"
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      # 1) Checkout del repo
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2) Python 3.11
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: onpe/requirements.txt

      # 3) Dependencias (solo curl_cffi)
      - name: Install dependencies
        run: pip install -r onpe/requirements.txt

      # 4) Scraper segunda vuelta → data.json directamente
      - name: Scrape ONPE segunda vuelta
        run: python onpe/scraper_2v.py --out data.json

      # 5) Commit + push si hubo cambios
      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "Sin cambios" || (
            git commit -m "🗳️ Update data.json · $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          )
